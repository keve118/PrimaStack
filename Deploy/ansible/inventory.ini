[localhost]
localhost ansible_connection=local

[Zabbix]
zabbix-one ansible_host=1.1.1.1 fixed_ip=1.1.1.1
zabbix-two ansible_host=1.1.1.1 fixed_ip=1.1.1.1
zabbix-db ansible_host=1.1.1.1 fixed_ip=1.1.1.1

[Zabbix:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/ansible
ansible_ssh_common_args='-o ProxyJump=ubuntu@2.2.2.2 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null'

[ansible_center]
ansible-center ansible_host=2.2.2.2 fixed_ip=1.1.1.1 floating_ip=2.2.2.2 ansible_user=ubuntu

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'
